<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="google" content="notranslate">
<title>Galaxy Intro</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Audiowide&family=Vazirmatn:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Vazirmatn',sans-serif;}

  /* ===== INTRO WRAPPER ===== */
  #intro{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;}

  /* Canvas layers */
  #galaxy-cv{position:absolute;inset:0;width:100%;height:100%;z-index:1;}

  /* ===== LANGUAGE SWITCHER (top-left) ===== */
  .lang-row{position:absolute;top:16px;left:16px;display:flex;gap:8px;z-index:5;flex-wrap:wrap;}
  .lang-btn{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:6px 8px;border-radius:10px;border:1px solid #ffffff22;background:#ffffff11;backdrop-filter:blur(6px);transition:0.2s;}
  .lang-btn:hover{background:#ffffff1c;}
  .lang-btn.active{border-color:#fff;background:#ffffff26;box-shadow:0 0 12px #a855f755;}
  .lang-flag{font-size:1.5rem;line-height:1;display:flex;align-items:center;justify-content:center;}
  .lang-name{font-size:0.56rem;color:#ffffff88;letter-spacing:0.5px;}
  .lang-btn.active .lang-name{color:#fff;}

  /* ===== TITLE + CONTENT ===== */
  .intro-content{position:relative;z-index:4;display:flex;flex-direction:column;align-items:center;gap:18px;padding:20px;text-align:center;}

  .title-wrap{position:relative;perspective:800px;}
  .pixel-guard-title{
    font-family:'Audiowide','Orbitron',sans-serif;
    font-weight:400;
    font-size:clamp(2.4rem,10vw,4.6rem);
    letter-spacing:6px;
    line-height:1.1;
    position:relative;
    color:#f4ecff;
    background:linear-gradient(180deg,#ffffff 0%,#e9d5ff 25%,#c084fc 55%,#8b3ff0 80%,#5b21b6 100%);
    -webkit-background-clip:text;
    background-clip:text;
    -webkit-text-fill-color:transparent;
    filter:
      drop-shadow(0 1px 0 #ffffff55)
      drop-shadow(0 0 12px #c084fcbb)
      drop-shadow(0 0 34px #a855f799)
      drop-shadow(0 0 70px #7c3aed66);
    transform:rotateX(14deg);
    transform-style:preserve-3d;
    animation:floatTitle 5s ease-in-out infinite;
  }
  .pixel-guard-title::before{
    content:attr(data-text);
    position:absolute;left:0;top:0;width:100%;
    font-family:'Audiowide','Orbitron',sans-serif;letter-spacing:6px;
    color:transparent;
    -webkit-text-stroke:1.5px #ffffff2a;
    z-index:-1;
    transform:translateZ(-6px) translateY(3px);
  }
  .pixel-guard-title::after{
    content:attr(data-text);
    position:absolute;left:0;top:0;width:100%;
    font-family:'Audiowide','Orbitron',sans-serif;letter-spacing:6px;
    color:transparent;
    -webkit-text-stroke:1.5px #4c1d9555;
    z-index:-2;
    transform:translateZ(-16px) translateY(9px);
  }
  @keyframes floatTitle{
    0%,100%{transform:rotateX(14deg) translateY(0px);}
    50%{transform:rotateX(8deg) translateY(-8px);}
  }

  .welcome-small{font-family:'Orbitron',sans-serif;font-size:clamp(0.5rem,2.2vw,0.75rem);color:#c4b5fdaa;letter-spacing:7px;margin-top:-6px;}
  .welcome-sub{font-size:clamp(0.95rem,3.2vw,1.15rem);color:#e9d5ff;letter-spacing:1px;font-weight:700;}

  .intro-start{
    font-family:'Vazirmatn',sans-serif;font-size:clamp(1rem,3.5vw,1.25rem);font-weight:900;
    background:linear-gradient(135deg,#6d28d9,#a855f7);
    color:#fff;border:2px solid #c084fc77;
    padding:16px 58px;border-radius:50px;cursor:pointer;letter-spacing:2px;
    display:flex;align-items:center;gap:10px;
    box-shadow:0 0 30px #a855f755, inset 0 1px 0 #ffffff44;
    transition:0.2s;margin-top:10px;
    position:relative;z-index:10;
  }
  .intro-start:hover{transform:scale(1.05);box-shadow:0 0 50px #a855f7aa, inset 0 1px 0 #ffffff44;}
  .intro-start:active{transform:scale(0.96);}
  .intro-start .arrow{transition:transform 0.2s;}
  .intro-start:hover .arrow{transform:translateX(-4px);}

  /* ===== APP placeholder (what intro leads to) ===== */
  #app{display:none;height:100vh;width:100%;background:#0d0b1a;color:#e9d5ff;align-items:center;justify-content:center;flex-direction:column;gap:14px;font-family:'Vazirmatn',sans-serif;}
  #app.show{display:flex;}
  #app h1{font-family:'Orbitron',sans-serif;color:#a855f7;letter-spacing:2px;}
  #app button{background:#1e1840;color:#a855f7;border:1px solid #2d1b69;padding:10px 22px;border-radius:20px;cursor:pointer;font-family:'Vazirmatn',sans-serif;font-weight:700;}
</style>
</head>
<body>

<!-- ============ INTRO ============ -->
<div id="intro">
  <canvas id="galaxy-cv"></canvas>

  <div class="lang-row" translate="no">
    <div class="lang-btn active" data-lang="en" onclick="setLang('en',this)"><div class="lang-flag">🇬🇧</div><div class="lang-name" style="font-family:'Vazirmatn',sans-serif">English</div></div>
    <div class="lang-btn" data-lang="fa" onclick="setLang('fa',this)"><div class="lang-flag">🇮🇷</div><div class="lang-name" style="font-family:'Vazirmatn',sans-serif">فارسی</div></div>
    <div class="lang-btn" data-lang="tr" onclick="setLang('tr',this)"><div class="lang-flag">🇹🇷</div><div class="lang-name" style="font-family:'Vazirmatn',sans-serif">Türkçe</div></div>
    <div class="lang-btn" data-lang="ar" onclick="setLang('ar',this)"><div class="lang-flag">🇸🇦</div><div class="lang-name" style="font-family:'Vazirmatn',sans-serif">العربية</div></div>
    <div class="lang-btn" data-lang="zh" onclick="setLang('zh',this)"><div class="lang-flag">🇨🇳</div><div class="lang-name" style="font-family:'Vazirmatn',sans-serif">中文</div></div>
  </div>

  <div class="intro-content">
    <div class="title-wrap">
      <div class="pixel-guard-title" id="i-title" data-text="PIXEL GUARD">PIXEL GUARD</div>
    </div>
    <div class="welcome-small" id="i-welcome">WELCOME</div>
    <div class="welcome-sub" id="i-sub">Welcome, traveler</div>
    <button class="intro-start" onclick="enterApp()">
      <span id="i-start-txt">Enter Lobby</span><span class="arrow">▶</span>
    </button>
  </div>
</div>

<!-- ============ APP (placeholder — replace with your real lobby) ============ -->
<div id="app">
  <h1>🎮 Lobby loaded successfully</h1>
  <p>این صفحه فقط برای تست دکمه‌ست — لابی واقعیت رو اینجا وصل می‌کنیم.</p>
  <button onclick="backToIntro()">← Back to intro</button>
</div>

<script>
/* ======================================================
   GALAXY BACKGROUND ANIMATION
   Stars + drifting nebula clouds + a couple of slowly
   orbiting "planets" + occasional shooting stars.
====================================================== */
(function(){
  const cv = document.getElementById('galaxy-cv');
  const ctx = cv.getContext('2d');
  let W, H;

  function resize(){
    W = cv.width = window.innerWidth;
    H = cv.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // Starfield
  const STAR_COUNT = 220;
  const stars = [];
  for (let i = 0; i < STAR_COUNT; i++){
    stars.push({
      x: Math.random(),
      y: Math.random(),
      r: Math.random() * 1.4 + 0.3,
      tw: Math.random() * Math.PI * 2,
      sp: Math.random() * 0.02 + 0.008
    });
  }

  // Nebula blobs
  const NEB_COLORS = ['#a855f7','#7c3aed','#ec4899','#3b82f6','#06b6d4'];
  const nebulas = [];
  for (let i = 0; i < 7; i++){
    nebulas.push({
      x: Math.random(),
      y: Math.random(),
      r: Math.random() * 220 + 140,
      c: NEB_COLORS[i % NEB_COLORS.length],
      dx: (Math.random() - 0.5) * 0.00015,
      dy: (Math.random() - 0.5) * 0.00015
    });
  }

  // Planets — fewer, bigger, much more detailed for a premium look
  const planets = [
    {
      xr: 0.84, yr: 0.26, radius: 72,
      base: '#e08a3c', shade: '#5c2c0c', high: '#ffe9c4',
      bands: ['#c9722f','#e6a35c','#a85a22','#f2b876','#8a4519'],
      ring: true, ringColor: '#e8c99a', ringTilt: -0.38,
      rot: 0, spin: 0.0016, atmosphere: '#ffb56b'
    },
    {
      xr: 0.10, yr: 0.70, radius: 34,
      base: '#7c4fd8', shade: '#20103f', high: '#e4d4ff',
      bands: ['#6a3fc4','#8f68e6','#4b2a9e'],
      ring: false, rot: 0, spin: 0.0026, atmosphere: '#a78bfa',
      moon: { r: 7, dist: 58, speed: 0.012, color: '#cbd5e1' }
    },
    {
      xr: 0.92, yr: 0.80, radius: 20,
      base: '#22c17a', shade: '#063d26', high: '#baf7d8',
      bands: ['#1ba368','#2fe093'],
      ring: false, rot: 0, spin: -0.003, atmosphere: '#4ade80'
    }
  ];

  function drawPlanet(p){
    const cx = p.xr * W, cy = p.yr * H;
    p.rot += p.spin;

    // outer atmospheric glow
    const glow = ctx.createRadialGradient(cx, cy, p.radius*0.6, cx, cy, p.radius*2.6);
    glow.addColorStop(0, p.atmosphere + '2e');
    glow.addColorStop(0.5, p.atmosphere + '12');
    glow.addColorStop(1, 'transparent');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(cx, cy, p.radius * 2.6, 0, Math.PI*2);
    ctx.fill();

    // ring behind planet
    if (p.ring) drawRing(p, cx, cy, false);

    // moon behind or in front depending on orbit phase
    let moonX, moonY, moonBehind = false;
    if (p.moon){
      p.moon.a = (p.moon.a || 0) + p.moon.speed;
      moonX = cx + Math.cos(p.moon.a) * p.moon.dist;
      moonY = cy + Math.sin(p.moon.a) * p.moon.dist * 0.4;
      moonBehind = Math.sin(p.moon.a) < 0;
      if (moonBehind) drawMoon(p, moonX, moonY);
    }

    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, cy, p.radius, 0, Math.PI*2);
    ctx.clip();

    // base sphere gradient (gives roundness)
    const sphere = ctx.createRadialGradient(
      cx - p.radius*0.4, cy - p.radius*0.42, p.radius*0.05,
      cx, cy, p.radius*1.15
    );
    sphere.addColorStop(0, p.high);
    sphere.addColorStop(0.35, p.base);
    sphere.addColorStop(0.75, p.base);
    sphere.addColorStop(1, p.shade);
    ctx.fillStyle = sphere;
    ctx.fillRect(cx-p.radius, cy-p.radius, p.radius*2, p.radius*2);

    // horizontal rotating surface bands, curved to follow sphere
    ctx.globalAlpha = 0.55;
    const bandCount = p.bands.length;
    for (let i=0;i<bandCount;i++){
      const t = (i/bandCount) + (p.rot*0.05) % 1;
      const yOff = (((t % 1) + 1) % 1 - 0.5) * p.radius * 2;
      const rowH = p.radius * (0.16 + Math.cos(yOff/p.radius*1.4) * 0.05);
      const curveShrink = Math.cos((yOff / p.radius) * 1.4);
      const rowW = p.radius * 1.05 * Math.max(0.15, Math.abs(curveShrink));
      ctx.fillStyle = p.bands[i % p.bands.length];
      ctx.beginPath();
      ctx.ellipse(cx, cy + yOff, rowW, Math.max(1.5, rowH*0.5), 0, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    // terminator shading (day/night curve) for a real 3D sphere feel
    const term = ctx.createRadialGradient(
      cx + p.radius*0.55, cy + p.radius*0.55, p.radius*0.1,
      cx + p.radius*0.2, cy + p.radius*0.2, p.radius*1.3
    );
    term.addColorStop(0, 'rgba(0,0,0,0.55)');
    term.addColorStop(0.6, 'rgba(0,0,0,0.15)');
    term.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = term;
    ctx.fillRect(cx-p.radius, cy-p.radius, p.radius*2, p.radius*2);

    // rim light on the opposite edge (subtle backlight)
    ctx.strokeStyle = p.high + '55';
    ctx.lineWidth = p.radius*0.06;
    ctx.beginPath();
    ctx.arc(cx, cy, p.radius*0.97, Math.PI*1.15, Math.PI*1.55);
    ctx.stroke();

    // specular highlight
    const spec = ctx.createRadialGradient(
      cx - p.radius*0.42, cy - p.radius*0.46, 0,
      cx - p.radius*0.42, cy - p.radius*0.46, p.radius*0.5
    );
    spec.addColorStop(0, 'rgba(255,255,255,0.5)');
    spec.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = spec;
    ctx.beginPath();
    ctx.arc(cx - p.radius*0.42, cy - p.radius*0.46, p.radius*0.5, 0, Math.PI*2);
    ctx.fill();

    ctx.restore();

    // crisp thin outline so it doesn't blend into background
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(cx, cy, p.radius, 0, Math.PI*2);
    ctx.stroke();

    if (p.ring) drawRing(p, cx, cy, true);
    if (p.moon && !moonBehind) drawMoon(p, moonX, moonY);
  }

  function drawMoon(p, mx, my){
    const g = ctx.createRadialGradient(mx-p.moon.r*0.4, my-p.moon.r*0.4, 0, mx, my, p.moon.r);
    g.addColorStop(0, '#ffffff');
    g.addColorStop(1, p.moon.color);
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(mx, my, p.moon.r, 0, Math.PI*2);
    ctx.fill();
  }

  function drawRing(p, cx, cy, front){
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(p.ringTilt);
    const rOuter = p.radius * 1.9;
    const rInner = p.radius * 1.25;

    const startAngle = front ? Math.PI : 0;
    const endAngle = front ? Math.PI*2 : Math.PI;

    const grad = ctx.createLinearGradient(-rOuter, 0, rOuter, 0);
    grad.addColorStop(0, p.ringColor + '00');
    grad.addColorStop(0.25, p.ringColor + 'aa');
    grad.addColorStop(0.5, p.ringColor + '55');
    grad.addColorStop(0.75, p.ringColor + 'aa');
    grad.addColorStop(1, p.ringColor + '00');

    ctx.strokeStyle = grad;
    ctx.lineWidth = (rOuter - rInner) * 0.5;
    ctx.beginPath();
    ctx.ellipse(0, 0, (rOuter+rInner)/2, (rOuter+rInner)/2 * 0.28, 0, startAngle, endAngle);
    ctx.stroke();

    // thin bright edge line
    ctx.strokeStyle = p.ringColor + '66';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.ellipse(0, 0, rOuter, rOuter*0.28, 0, startAngle, endAngle);
    ctx.stroke();

    ctx.restore();
  }

  let shootingStar = null;

  function spawnShootingStar(){
    shootingStar = {
      x: Math.random() * W * 0.6 + W*0.2,
      y: Math.random() * H * 0.3,
      len: 90 + Math.random()*120,
      speed: 9 + Math.random()*6,
      angle: Math.PI * 0.22,
      life: 1
    };
  }

  function draw(){
    ctx.fillStyle = '#020103';
    ctx.fillRect(0, 0, W, H);

    // nebula clouds
    nebulas.forEach(n => {
      n.x += n.dx; n.y += n.dy;
      if (n.x < -0.2) n.x = 1.2; if (n.x > 1.2) n.x = -0.2;
      if (n.y < -0.2) n.y = 1.2; if (n.y > 1.2) n.y = -0.2;
      const cx = n.x * W, cy = n.y * H;
      const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, n.r);
      g.addColorStop(0, n.c + '22');
      g.addColorStop(1, 'transparent');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(cx, cy, n.r, 0, Math.PI*2);
      ctx.fill();
    });

    // planets
    planets.forEach(drawPlanet);

    // stars (twinkle)
    stars.forEach(s => {
      s.tw += s.sp;
      const bri = 0.35 + Math.abs(Math.sin(s.tw)) * 0.65;
      ctx.globalAlpha = bri;
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI*2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;

    // shooting star
    if (!shootingStar && Math.random() < 0.01) spawnShootingStar();
    if (shootingStar){
      const s = shootingStar;
      const dx = Math.cos(s.angle) * s.len;
      const dy = Math.sin(s.angle) * s.len;
      const grad = ctx.createLinearGradient(s.x, s.y, s.x - dx, s.y - dy);
      grad.addColorStop(0, '#ffffffee');
      grad.addColorStop(1, 'transparent');
      ctx.strokeStyle = grad;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(s.x, s.y);
      ctx.lineTo(s.x - dx, s.y - dy);
      ctx.stroke();

      s.x += Math.cos(s.angle) * s.speed;
      s.y += Math.sin(s.angle) * s.speed;
      s.life -= 0.012;
      if (s.life <= 0 || s.x > W + 50 || s.y > H + 50) shootingStar = null;
    }

    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
})();

/* ======================================================
   LANGUAGE SWITCHER
====================================================== */
const TXT = {
  en: { welcome:'WELCOME',      sub:'Welcome, traveler',        start:'Enter Lobby',   dir:'ltr' },
  fa: { welcome:'خوش آمدید',    sub:'خوش اومدی، مسافر',          start:'ورود به لابی',  dir:'rtl' },
  tr: { welcome:'HOŞ GELDİN',   sub:'Hoş geldin, gezgin',        start:'Lobiye Gir',    dir:'ltr' },
  ar: { welcome:'أهلاً وسهلاً', sub:'أهلاً بك أيها المسافر',      start:'ادخل اللوبي',   dir:'rtl' },
  zh: { welcome:'欢迎',         sub:'欢迎你，旅行者',              start:'进入大厅',       dir:'ltr' }
};

function setLang(lang, el){
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  if (el) el.classList.add('active');

  const d = TXT[lang] || TXT.en;
  document.getElementById('i-welcome').textContent = d.welcome;
  document.getElementById('i-sub').textContent = d.sub;
  document.getElementById('i-start-txt').textContent = d.start;
  document.documentElement.setAttribute('dir', d.dir);
  document.documentElement.setAttribute('lang', lang);
}

/* ======================================================
   ENTER LOBBY BUTTON
====================================================== */
function enterApp(){
  const intro = document.getElementById('intro');
  const app = document.getElementById('app');
  if (intro) intro.style.display = 'none';
  if (app) app.classList.add('show');
}

function backToIntro(){
  const intro = document.getElementById('intro');
  const app = document.getElementById('app');
  if (app) app.classList.remove('show');
  if (intro) intro.style.display = 'flex';
}
</script>
</body>
</html>
